<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c1117;--sf:#161d27;--sf2:#1e2736;--bd:#2a3545;--ac:#f59e0b;--ok:#22c55e;--no:#ef4444;--na:#6b7280;--tx:#e8eaed;--td:#7a8a9a}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overscroll-behavior:none;user-select:none;-webkit-user-select:none}
input,textarea,select{user-select:text;-webkit-user-select:text;font-size:16px!important}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,textarea,select{border:none;outline:none;font-family:inherit}
.hide{display:none!important}
.hdr{position:sticky;top:0;z-index:50;padding:12px 16px;display:flex;align-items:center;gap:12px;background:var(--bg);border-bottom:1px solid var(--bd)}
.hdr h1{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr .sub{font-size:11px;color:var(--td)}
.hdr-r{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--sf2)}
.card{background:var(--sf);border-radius:12px;padding:12px;margin-bottom:8px}
.card-row{display:flex;align-items:center;gap:12px}
.card-label{flex:1;font-size:13px;line-height:1.3}
.stitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ac);padding:4px 4px 8px}
.inp{width:100%;height:46px;border-radius:10px;padding:0 14px;font-size:16px;font-family:monospace;background:var(--sf2);color:var(--tx);border:2px solid var(--bd)}
.inp:focus,.inp.has{border-color:var(--ac)}
.inp.bad{border-color:var(--no)!important;background:#1a0a0a;color:var(--no)}
.sel{height:46px;border-radius:10px;padding:0 12px;font-size:15px;background:var(--sf2);color:var(--tx);border:2px solid var(--bd);appearance:none;-webkit-appearance:none}
.okno{display:flex;gap:4px}
.okno.cmp{width:150px;flex-shrink:0}
.okno button{flex:1;height:42px;border-radius:10px;font-weight:700;font-size:12px;border:2px solid var(--bd);background:var(--sf);color:var(--td);transition:all .15s}
.okno.cmp button{height:34px;font-size:11px}
.okno button.s-ok{background:var(--ok);border-color:var(--ok);color:#fff}
.okno button.s-no{background:var(--no);border-color:var(--no);color:#fff}
.okno button.s-na{background:var(--na);border-color:var(--na);color:#fff}
.tabs{display:flex;overflow-x:auto;gap:4px;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.tabs-wrap{display:flex;flex-wrap:wrap;gap:4px;padding-bottom:8px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;white-space:nowrap;background:var(--sf2);color:var(--td)}
.tab.on{background:var(--ac);color:var(--bg)}
.pils{display:flex;overflow-x:auto;gap:6px;padding:10px 0;-webkit-overflow-scrolling:touch}
.pils::-webkit-scrollbar{display:none}
.pil{flex-shrink:0;min-width:52px;padding:6px 8px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;border:2px solid var(--bd);background:transparent;color:var(--td)}
.pil.on{outline:2px solid var(--ac);outline-offset:2px}
.pil.p-ok{background:rgba(34,197,94,.2);border-color:var(--ok);color:var(--ok)}
.pil.p-mal{background:rgba(239,68,68,.2);border-color:var(--no);color:var(--no)}
.pil.p-pdte{background:rgba(245,158,11,.2);border-color:#f59e0b;color:#f59e0b}
.pil.p-empty{background:rgba(0,176,240,.15);border-color:#00b0f0;color:#00b0f0}
.pil:not(.p-ok):not(.p-mal):not(.p-pdte):not(.p-empty).on{background:var(--sf2);border-color:var(--ac);color:var(--ac)}
.prog{width:100%;height:7px;border-radius:4px;background:var(--bd);overflow:hidden}
.prog-b{height:100%;border-radius:4px;transition:width .5s;background:var(--ac)}
.prog-b.done{background:var(--ok)}
.photo-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.ph-th{position:relative;flex-shrink:0;width:64px;height:64px;border-radius:10px;overflow:hidden;border:2px solid var(--bd)}
.ph-th img{width:100%;height:100%;object-fit:cover}
.ph-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:var(--no);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ph-add{flex-shrink:0;width:64px;height:64px;border-radius:10px;border:2px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--td);font-size:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{padding:14px;border-radius:12px;background:var(--sf)}
.sc-l{font-size:11px;color:var(--td)}.sc-v{font-size:22px;font-weight:700;margin-top:2px}
.gps-i{display:flex;gap:8px;align-items:center;padding:6px 10px;border-radius:8px;background:var(--sf2);font-size:11px;color:var(--td);margin-bottom:6px}
.gps-d{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pu 2s infinite;display:inline-block}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.exp{margin:8px 16px;padding:14px;border-radius:12px;background:var(--sf);border:1px solid var(--ac)}
.exp-b{width:100%;height:46px;border-radius:12px;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
.cnt{padding:0 16px 32px}
.ta{width:100%;border-radius:10px;padding:10px;font-size:14px;background:var(--sf2);color:var(--tx);border:2px solid var(--bd);resize:none}
.sum-row{display:flex;align-items:center;gap:8px;margin-top:6px;padding:6px 8px;border-radius:8px;background:var(--sf2);font-size:12px}
.tr-list{max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tr-item{width:100%;text-align:left;padding:10px 12px;border-radius:10px;margin-bottom:4px;border:2px solid var(--bd);background:var(--sf);display:flex;justify-content:space-between;align-items:center;font-size:13px}
.tr-item.tr-ok{border-color:var(--ok);background:rgba(34,197,94,.1)}
.tr-item.tr-wip{border-color:#f59e0b;background:rgba(245,158,11,.1)}
.tr-item.tr-bad{border-color:var(--no);background:rgba(239,68,68,.1)}
.tr-item.tr-sel{border-color:var(--ac);background:var(--sf2)}
.sync-dot{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:4px 8px;border-radius:6px;background:var(--sf2)}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="cam" accept="image/*" capture="environment" multiple style="display:none">

<script>
const SK='checklist-solar-v3',CK='checklist-solar-cfg';
let APP=ld(SK)||{trackers:{}}, CFG=ld(CK)||{syncUrl:'',tecnico:''};
const SYNC_URL='https://script.google.com/macros/s/AKfycbxNbWR8rqrsugUEfJClSfTCtJVI9Gze5j9l6330Iw81v_fuTApAaAZkwt3GEjqHIBQ6/exec';
CFG.syncUrl=SYNC_URL;
let V={screen:CFG.tecnico?'home':'setup',tr:null,tab:'cim',pi:0,fila:'motor',exp:false,ms:null,selPv:0,selSub:0};
let GPS=null, LAST_CHG=null, CHANGE_Q=[], SYNC_OK=null, SYNC_Q=[], SYNC_T=null;

function ld(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function sv(){try{localStorage.setItem(SK,JSON.stringify(APP))}catch(e){}}
function sc(){try{localStorage.setItem(CK,JSON.stringify(CFG))}catch(e){}}

// PILLAR CONFIG
const PCFG={
  monofila_corto:{motor:['2N-MP','1N-MP','MP','1S-MP','2S-MP'],conducida:null},
  monofila_largo:{motor:['4N-MP','3N-MP','2N-MP','1N-MP','MP','1S-MP','2S-MP','3S-MP','4S-MP'],conducida:null},
  bifila_corto:{motor:['2N-MP','1N-MP','MP','1S-MP','2S-MP'],conducida:['2N','1N','MP-FC','1S','2S']},
  bifila_largo:{motor:['4N-MP','3N-MP','2N-MP','1N-MP','MP','1S-MP','2S-MP','3S-MP','4S-MP'],conducida:['4N','3N','2N','1N','MP-FC','1S','2S','3S','4S']}
};

// DISTANCE AUTO-SUM CONFIG
// Largo: pilars 0-8 (4N,3N,2N,1N,MP,1S,2S,3S,4S), MP=index 4
const DIST_LARGO={
  3:{seg:7610,tol:[7570,7630]},   // 1N
  2:{seg:7210,tol:[14770,14830]}, // 2N = 7210 + dist_1N
  1:{seg:7010,tol:[21770,21830]}, // 3N
  0:{seg:6710,tol:[28470,28530]}, // 4N
  5:{seg:7630,tol:[7570,7630]},   // 1S
  6:{seg:7210,tol:[14770,14830]}, // 2S
  7:{seg:7000,tol:[21770,21830]}, // 3S
  8:{seg:6710,tol:[28470,28530]}, // 4S
};
// Corto: pilars 0-4 (2N,1N,MP,1S,2S), MP=index 2
const DIST_CORTO={
  1:{seg:6710,tol:[6670,6730]},    // 1N
  0:{seg:6715,tol:[13370,13430]},  // 2N
  3:{seg:6695,tol:[6670,6730]},    // 1S
  4:{seg:6705,tol:[13370,13430]},  // 2S
};

function getDistCfg(type){return(type==='bifila_largo'||type==='monofila_largo')?DIST_LARGO:DIST_CORTO}
function getMPi(type){return(type==='bifila_largo'||type==='monofila_largo')?4:2}

function calcDistSum(td,px,pi,type){
  const dc=getDistCfg(type),mpI=getMPi(type);
  if(pi===mpI||!dc[pi])return null;
  let sum=0;
  if(pi<mpI){for(let i=pi;i<mpI;i++){const t=td.cim[`${px}_${i}_dist_ns_tramo`];if(t==null)return null;sum+=t}}
  else{for(let i=pi;i>mpI;i--){const t=td.cim[`${px}_${i}_dist_ns_tramo`];if(t==null)return null;sum+=t}}
  return sum;
}

// FIELD DEFINITIONS
const MED=[
  {id:'altura',label:'Altura pilar (Distancia libre)',type:'number',unit:'mm'},
  {id:'dist_ns_tramo',label:'Distancia N-S al pilar anterior (tramo)',type:'number',unit:'mm',isTramo:true},
  {id:'vert_ns',label:'Verticalidad N-S',type:'number',unit:'º',tol:[88,92]},
  {id:'vert_eo',label:'Verticalidad E-O',type:'number',unit:'º',tol:[88,92]},
  {id:'torsion',label:'Torsión en cabeza de pilares',type:'okno',def:'NO'},
  {id:'desv_eo',label:'Desviación Este-Oeste cabezas',type:'okno',def:'NO'},
  {id:'desv_altura',label:'Desviación de Altura (Dv)',type:'okno',def:'NO'},
];
const COMP=[
  {id:'galvanizado',label:'Reparación galvanizado según procedimiento',def:'SI'},
  {id:'golpes',label:'Deformación por golpes',def:'NO'},
  {id:'entalladura',label:'Deformación por entalladura',def:'NO'},
  {id:'pliegue',label:'Deformación por pliegue',def:'NO'},
  {id:'cabezas',label:'Deformaciones en cabezas del pilar',def:'NO'},
  {id:'corte',label:'Corte y mecanizado',def:'NO'},
  {id:'mecanizados',label:'Mecanizados fuera de tolerancias',def:'NO'},
  {id:'orientacion',label:'Orientación correcta pilares (Norte-Sur)',def:'SI'},
  {id:'perfil',label:'Perfil de sección correcta',def:'SI'},
  {id:'relleno',label:'Relleno de perforaciones',def:'N/A'},
  {id:'oxidacion',label:'Presencia de oxidación',def:'NO'},
  {id:'socavones',label:'Socavones en pie de pilar',def:'NO'},
  {id:'cimentacion',label:'Validación de cimentación',def:'SI'},
  {id:'zanjas',label:'Zanjas y excavaciones < 1500 mm',def:'NO'},
  {id:'centrado',label:'Pilar centrado Micropilote',def:'N/A'},
  {id:'diametro',label:'Diámetro correcto Micropilote',def:'N/A'}
];
const MONT_GROUPS=[
  {id:'g1',title:'Soportes y Cabezas',secs:[
    {id:'ms',title:'Soporte central (MS)',items:[{id:'ms_par',label:'Par apriete tornillería (230 N.m)'},{id:'ms_sup',label:'Superficie soportes paralela pendiente N-S'},{id:'ms_ali',label:'Ambos soportes alineados mismo plano'},{id:'ms_gir',label:'Par apriete tornillería giro'}]},
    {id:'bs',title:'Cabeza de giro (BS)',items:[{id:'bs_par',label:'Par apriete tornillería (280 N.m)'},{id:'bs_peg',label:'Pegatina actuador = referencia B1'},{id:'bs_mot',label:'Motor DC orientado al Oeste'}]}
  ]},
  {id:'g2',title:'Vigas',secs:[
    {id:'b1',title:'Viga Central (B1)',items:[{id:'b1_par',label:'Par apriete tornillería (280 N.m)'},{id:'b1_sol',label:'Soldadura vigas orientada al suelo'}]},
    {id:'sf',title:'Vigas Secundarias (SF)',items:[{id:'sf_par',label:'Par apriete tornillería (140 N.m)'},{id:'sf_rem',label:'Correcto remachado entre vigas'},{id:'sf_pin',label:'Correcto pintado de remaches'},{id:'sf_vis',label:'Visores en caras verticales'}]},
    {id:'vp',title:'Vigas Principales',items:[{id:'vp_140',label:'Par apriete (140 N.m)'},{id:'vp_410',label:'Par apriete (410 N.m)'},{id:'vp_sim',label:'Simetría E-O (±15mm)'},{id:'vp_per',label:'Perpendicularidad'},{id:'vp_ali',label:'Alineación'}]}
  ]},
  {id:'g3',title:'Transmisión',secs:[
    {id:'tr',title:'Transmisión (TR)',items:[{id:'tr_par',label:'Par apriete tornillería (140 N.m)'},{id:'tr_ang',label:'Ángulo slews motor/conducido (±0.20º)'},{id:'tr_car',label:'Montaje tornillo cardán'},{id:'tr_esp',label:'Espaciado cardán-viga (80-120mm)'},{id:'tr_cpa',label:'Par tornillo cardán (30 N.m)'},{id:'tr_u9',label:'Marcado Unión 9 (10 N.m)'},{id:'tr_u4',label:'Par Unión 4 (35 N.m)'},{id:'tr_u13',label:'Par Unión 13 (140 N.m)'},{id:'tr_u8',label:'Marcado Unión 8 (20 N.m)'},{id:'tr_u32',label:'Par Unión 32 (140 N.m)'}]}
  ]},
  {id:'g4',title:'Dampers y PAT',secs:[
    {id:'ds',title:'Dampers (DS)',items:[{id:'ds_par',label:'Par apriete tornillería (20 N.m)'},{id:'ds_est',label:'Dampers al ESTE en mitad ESTE'},{id:'ds_oes',label:'Dampers al OESTE en mitad OESTE'},{id:'ds_pc',label:'Ubicación damper pilar C'},{id:'ds_pw',label:'Ubicación damper pilar W'},{id:'ds_cil',label:'Cilindro damper hacia abajo'}]},
    {id:'pat',title:'Puesta a Tierra',items:[{id:'pat_ok',label:'Correcta instalación PAT'},{id:'pat_int',label:'PAT sin interferencias'}]}
  ]},
  {id:'g5',title:'Visual y Tapones',secs:[
    {id:'iv',title:'Inspecciones Visuales',items:[{id:'iv_gol',label:'Sin golpes/deformaciones'},{id:'iv_mod',label:'Sin modificaciones estructurales'},{id:'iv_gal',label:'Galvanizado reparado'},{id:'iv_tor',label:'Tornillería en buenas condiciones'}]},
    {id:'tp',title:'Tapón Plástico',items:[{id:'tp_ok',label:'Tapones con tornillos autorroscantes'}]}
  ]}
];
// Confirmation group
MONT_GROUPS.push({id:'g6',title:'✅ Confirmación',secs:[
  {id:'tok',title:'Confirmación final',items:[{id:'tok_ok',label:'Tracker revisado y OK'}]}
]});
// Flat list for backward compatibility (countF, export, etc.)
const MONT=[];MONT_GROUPS.forEach(function(g){g.secs.forEach(function(s){MONT.push(s)})});

// GPS
function toggleLock(code){var td=getTD(code);td.locked=!td.locked;sv();syncTracker(code);if(V.screen==='tracker')R()}
function toggleLockBtn(btn,code){toggleLock(code);var lk=isLocked(code);btn.textContent=lk?'\u{1F512}':'\u{1F513}';btn.style.background=lk?'var(--no)':'var(--sf2)';btn.style.color=lk?'#fff':'var(--td)'}
function isLocked(code){var td=APP.trackers[code];return td&&td.locked}

function isAdmin(){var n=(CFG.tecnico||'').toLowerCase();return n.indexOf('moriana')>=0||n.indexOf('huarte')>=0}

function startGPS(){
  if(!navigator.geolocation)return;
  navigator.geolocation.watchPosition(p=>{
    GPS={lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy,ts:Date.now()};
    document.querySelectorAll('.gps-live').forEach(el=>{
      el.innerHTML='<span class="gps-d"></span> GPS: '+GPS.lat.toFixed(6)+', '+GPS.lon.toFixed(6)+' · ±'+Math.round(GPS.acc)+'m';
    });
    // Update GPS log for current tracker
    if(V.tr){
      var td=getTD(V.tr);
      if(!td.gps_log)td.gps_log=[];
      var last=td.gps_log.length?td.gps_log[td.gps_log.length-1]:null;
      if(!last||!last.lat||Math.abs(last.lat-GPS.lat)>0.0001||Math.abs(last.lon-GPS.lon)>0.0001){
        td.gps_log.push({lat:GPS.lat,lon:GPS.lon,acc:Math.round(GPS.acc),ts:new Date().toISOString()});
        if(td.gps_log.length>20)td.gps_log=td.gps_log.slice(-20);
        sv();
      }
    }
  },()=>{},{enableHighAccuracy:true,maximumAge:10000});
}
function gpsNow(){return GPS?{lat:GPS.lat,lon:GPS.lon,acc:Math.round(GPS.acc),ts:new Date().toISOString()}:{ts:new Date().toISOString()}}

// ============================================================
// SYNC — Google Sheets via image beacon (most reliable CORS-free method)
// ============================================================
function calcStatus(code){
  var td=getTD(code),m=getMI(code);if(!m)return{};
  var cfg=PCFG[m.type];
  var result={};
  var filas=cfg.conducida?['motor','conducida']:['motor'];
  filas.forEach(function(f){
    var pils=cfg[f],px=f==='motor'?'fm':'fc',mpI=getMPi(m.type);
    var pre=f==='motor'?'m_':'c_';
    // Check if any manual (numeric) field has been filled in this fila
    var anyManual=false;
    pils.forEach(function(_,i){
      if(td.cim[px+'_'+i+'_altura']!=null||td.cim[px+'_'+i+'_vert_ns']!=null||td.cim[px+'_'+i+'_vert_eo']!=null||td.cim[px+'_'+i+'_dist_ns_tramo']!=null)anyManual=true;
    });
    // Altura
    var aFill=0,aTotal=pils.length;
    pils.forEach(function(_,i){if(td.cim[px+'_'+i+'_altura']!=null)aFill++});
    result[pre+'alt']=aFill===0?'':aFill<aTotal?'PDTE':'SI';
    // Distancias
    var dFill=0,dTotal=0,dBad=0;
    pils.forEach(function(_,i){
      if(i===mpI)return;dTotal++;
      var v=td.cim[px+'_'+i+'_dist_ns_tramo'];
      if(v!=null){dFill++;var ds=calcDistSum(td,px,i,m.type);var dc=getDistCfg(m.type);
        if(ds!=null&&dc[i]&&(ds<dc[i].tol[0]||ds>dc[i].tol[1]))dBad++}
    });
    result[pre+'dist']=dFill===0?'':dFill<dTotal?'PDTE':dBad>0?'SI/MAL':'SI';
    // Verticalidad
    var vFill=0,vTotal=pils.length*2,vBad=0;
    pils.forEach(function(_,i){
      var ns=td.cim[px+'_'+i+'_vert_ns'],eo=td.cim[px+'_'+i+'_vert_eo'];
      if(ns!=null){vFill++;if(ns<88||ns>102)vBad++}
      if(eo!=null){vFill++;if(eo<88||eo>92)vBad++}
    });
    result[pre+'vert']=vFill===0?'':vFill<vTotal?'PDTE':vBad>0?'SI/MAL':'SI';
    // Resto (comprobaciones + okno mediciones): compare against defaults
    var rFill=0,rTotal=0,rBad=0;
    var defMap={torsion:'NO',desv_eo:'NO',desv_altura:'NO',
      galvanizado:'SI',golpes:'NO',entalladura:'NO',pliegue:'NO',cabezas:'NO',
      corte:'NO',mecanizados:'NO',orientacion:'SI',perfil:'SI',relleno:'N/A',
      oxidacion:'NO',socavones:'NO',cimentacion:'SI',zanjas:'NO',centrado:'N/A',diametro:'N/A'};
    var restoFields=Object.keys(defMap);
    pils.forEach(function(_,i){
      restoFields.forEach(function(fid){
        rTotal++;var v=td.cim[px+'_'+i+'_'+fid];
        if(v!=null){rFill++;if(v!==defMap[fid])rBad++}
      });
    });
    result[pre+'rest']=!anyManual?'':rFill<rTotal?'PDTE':rBad>0?'SI/MAL':'SI';
  });
  return result;
}

function pullLocks(){
  if(!CFG.syncUrl)return;
  var cbName='_cbl_'+Date.now();
  window[cbName]=function(data){
    delete window[cbName];
    if(data&&data.locks){
      Object.keys(data.locks).forEach(function(code){
        if(!APP.trackers[code])getTD(code);
        APP.trackers[code].locked=data.locks[code];
      });
      sv();
    }
  };
  var url=CFG.syncUrl+'?d='+encodeURIComponent(JSON.stringify({a:'gl'}))+'&cb='+cbName;
  var s=document.createElement('script');
  s.src=url;s.onload=function(){try{document.head.removeChild(s)}catch(e){}};
  s.onerror=function(){try{document.head.removeChild(s)}catch(e){}};

function pullTracker(code,callback){
  if(!CFG.syncUrl)return callback&&callback();
  var p={a:'g',t:code};
  var cbName='_cb_'+Date.now();
  var pullTime=Date.now();
  window[cbName]=function(data){
    delete window[cbName];
    if(data&&data.fields){
      var td=getTD(code);
      var changed=false;
      Object.keys(data.fields).forEach(function(key){
        var remote=data.fields[key];
        if(remote.v!=null&&remote.v!==''){
          var rv=isNaN(remote.v)?String(remote.v):parseFloat(remote.v);
          var localVal=td.cim[key];
          // Only overwrite if field wasn't edited locally since we sent the request
          var editedAfter=td._lastEdit&&td._lastEdit[key]&&td._lastEdit[key]>pullTime;
          if(!editedAfter&&(localVal==null||localVal==='')){
            td.cim[key]=rv;
            changed=true;
          }
        }
      });
      // Store who-did-what
      if(data.who)td._who=data.who;
      if(data.locked!=null)td.locked=!!data.locked;
      if(changed)sv();
    }
    if(callback)callback();
    R();
  };
  var url=CFG.syncUrl+'?d='+encodeURIComponent(JSON.stringify(p))+'&cb='+cbName;
  var s=document.createElement('script');
  s.src=url;
  s.onload=function(){try{document.head.removeChild(s)}catch(e){}};
  s.onerror=function(){try{document.head.removeChild(s)}catch(e){};if(callback)callback();};
  document.head.appendChild(s);
}

function flushSync(code){
  if(!CFG.syncUrl||!code)return;
  var td=getTD(code),m=getMI(code),c=countF(code);
  var nos=0;for(var k in td.cim)if(td.cim[k]==="NO")nos++;for(var k in td.mont)if(td.mont[k]==="NO")nos++;
  var gl=(td.gps_log||[]),last=gl.length?gl[gl.length-1]:{};
  
  // Grab all queued changes
  var queue=CHANGE_Q.splice(0,CHANGE_Q.length);
  
  // Send each change as a separate request (ensures all fields reach the server)
  // First send summary update (no field data, just status)
  var base={
    a:"s",t:code,tp:m?.type||"",pv:m?.pv||"",sub:m?.sub||0,
    mx:m?.mx||"",my:m?.my||"",te:CFG.tecnico||"",
    cp:c.cimT>0?Math.round(c.cimF/c.cimT*100):0,
    mp:c.montT>0?Math.round(c.montF/c.montT*100):0,
    pp:c.pct,nos:nos,
    ph:Object.values(td.photos||{}).reduce(function(a,arr){return a+(arr||[]).length},0),
    ob:(td.obs||"").substring(0,100),
    gl:last.lat||"",go:last.lon||""
  };
  var st=calcStatus(code);base.st=st;base.lk=td.locked?1:0;
  // Montaje group status
  var mg={};
  MONT_GROUPS.forEach(function(g){
    var gTot=0,gFl=0,gBad=false;
    g.secs.forEach(function(s){
      s.items.forEach(function(it){
        gTot++;
        if(td.mont[it.id]!=null){gFl++;if(td.mont[it.id]!=='SI')gBad=true}
      });
    });
    mg[g.id]=gFl===0?'':(gFl<gTot?'PDTE':(gBad?'SI/MAL':'SI'));
  });
  base.mg=mg;
  LAST_CHG=null;
  
  if(queue.length===0){
    doSync(base);
  }else{
    // Send each field change sequentially
    var idx=0;
    function sendNext(){
      if(idx>=queue.length){showSync('ok');return}
      var chg=queue[idx++];
      var p=JSON.parse(JSON.stringify(base));
      p.fid=chg.fid;p.fv=chg.fv;p.fp=chg.fp;p.ff=chg.ff;
      doSync(p,sendNext);
    }
    sendNext();
  }
}

function doSync(payload,cb){
  var encoded=encodeURIComponent(JSON.stringify(payload));
  var url=CFG.syncUrl+"?d="+encoded;
  var s=document.createElement("script");
  s.src=url;
  s.onload=function(){showSync("ok");try{document.head.removeChild(s)}catch(e){};if(cb)cb()};
  s.onerror=function(){showSync("ok");try{document.head.removeChild(s)}catch(e){};if(cb)cb()};
  document.head.appendChild(s);
}

function uploadPhoto(code, pilar, fila, photoData){
  if(!CFG.syncUrl)return;
  var b64=photoData.replace(/^data:image\/\w+;base64,/,'');
  var CS=7000, chunks=[];
  for(var i=0;i<b64.length;i+=CS)chunks.push(b64.substring(i,i+CS));
  var pid=code+'_'+Date.now();
  var fn=code+'_'+fila+'_'+pilar+'_'+new Date().toISOString().slice(0,19).replace(/[:.]/g,'-');
  var idx=0, total=chunks.length;
  showUpload(0,total);
  function next(){
    if(idx>=total){showUpload(-1,0);return}
    var p={a:"ph",id:pid,fn:fn,n:idx,tot:total,c:chunks[idx],last:idx===total-1?1:0,t:code,te:CFG.tecnico||'',p:pilar};
    var enc=encodeURIComponent(JSON.stringify(p));
    var url=CFG.syncUrl+"?d="+enc;
    var s=document.createElement("script");
    s.src=url;
    s.onload=function(){try{document.head.removeChild(s)}catch(e){}idx++;showUpload(idx,total);next()};
    s.onerror=function(){try{document.head.removeChild(s)}catch(e){}idx++;showUpload(idx,total);next()};
    document.head.appendChild(s);
  }
  next();
}
function showUpload(cur,tot){
  document.querySelectorAll('.upload-st').forEach(function(el){
    if(cur<0)el.innerHTML='<span style="color:var(--ok);font-size:11px">✅ Foto subida</span>';
    else if(tot>0)el.innerHTML='<span style="color:var(--ac);font-size:11px">📤 Subiendo foto '+cur+'/'+tot+'...</span>';
    else el.innerHTML='';
  });
  if(cur<0)setTimeout(function(){document.querySelectorAll('.upload-st').forEach(function(el){el.innerHTML=''})},4000);
}

function showSync(status){
  SYNC_OK=status;
  document.querySelectorAll('.sync-st').forEach(el=>{
    if(status==='ok')el.innerHTML='<span class="sync-dot" style="color:var(--ok)">✅ Sync</span>';
    else if(status==='sent')el.innerHTML='<span class="sync-dot" style="color:var(--ac)">☁️ Enviado</span>';
    else if(status==='err')el.innerHTML='<span class="sync-dot" style="color:var(--no)">⚠️ Error</span>';
    else el.innerHTML=CFG.syncUrl?'<span class="sync-dot">☁️</span>':'';
  });
  if(status==='ok'||status==='sent')setTimeout(()=>{SYNC_OK=null;showSync('')},4000);
}

function countF(code){
  const m=getMI(code);if(!m)return{cimF:0,cimT:0,montF:0,montT:0,pct:0};
  const cfg=PCFG[m.type],filas=cfg.conducida?['motor','conducida']:['motor'];
  let cimT=0,cimF=0;const td=getTD(code);
  filas.forEach(f=>{const pils=cfg[f];cimT+=pils.length*(MED.length+COMP.length);
    pils.forEach((_,i)=>{const px=f==='motor'?'fm':'fc';const mpi=getMPi(m.type);
      [...MED,...COMP].forEach(field=>{
        if(field.isTramo&&i===mpi){cimT--;return}
        if(td.cim[px+'_'+i+'_'+field.id]!=null)cimF++});
    });
  });
  const montT=MONT.reduce((a,s)=>a+s.items.length,0);
  const montF=Object.keys(td.mont).filter(k=>td.mont[k]!=null).length;
  return{cimF,cimT,montF,montT,pct:(cimT+montT)>0?Math.round((cimF+montF)/(cimT+montT)*100):0};
}

function importExcel(file){
  var reader=new FileReader();
  reader.onload=function(e){
    var data=new Uint8Array(e.target.result);
    var wb=XLSX.read(data,{type:'array'});
    var imported=0;
    wb.SheetNames.forEach(function(sn){
      var ws=wb.Sheets[sn];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1});
      if(rows.length<30)return;
      // Detect tracker: look for "Nº Tracker" in rows 1-10
      var trackerNum=null,pvSub=null;
      for(var r=0;r<10;r++){
        if(!rows[r])continue;
        var r0=String(rows[r][0]||'').toLowerCase();
        if(r0.indexOf('tracker')>=0&&rows[r][2]!=null)trackerNum=rows[r][2];
        if(r0.indexOf('pv')>=0||r0.indexOf('zona')>=0){var v=String(rows[r][2]||'');pvSub=v}
      }
      if(!trackerNum)return;
      // Find matching code in MASTER_DATA
      var code=null;
      Object.entries(MASTER_DATA).forEach(function(e){if(e[1].num===trackerNum)code=e[0]});
      if(!code){
        // Try matching by PV + num
        Object.entries(MASTER_DATA).forEach(function(e){
          if(e[1].num===parseInt(trackerNum))code=e[0];
        });
      }
      if(!code)return;
      var td=getTD(code),m=getMI(code),cfg=PCFG[m.type];
      // Parse motor section (row 30 area)
      var motorHeaderRow=-1,condHeaderRow=-1;
      for(var r=25;r<rows.length;r++){
        if(!rows[r])continue;
        var joined=rows[r].join(' ').toUpperCase();
        if(joined.indexOf('FILA MOTOR')>=0)motorHeaderRow=r;
        if(joined.indexOf('FILA CONDUC')>=0)condHeaderRow=r;
      }
      if(motorHeaderRow>=0)parseSection(td,rows,motorHeaderRow,cfg.motor,'fm',m.type);
      if(condHeaderRow>=0&&cfg.conducida)parseSection(td,rows,condHeaderRow,cfg.conducida,'fc',m.type);
      imported++;
    });
    sv();
    alert('Importados '+imported+' trackers de '+wb.SheetNames.length+' hojas');
    R();
  };
  reader.readAsArrayBuffer(file);
}

function parseSection(td,rows,startRow,pils,px,type){
  // Header row with pilar names is startRow+1
  // Data starts at startRow+2
  var medIds=['altura','dist_ns_tramo','vert_ns','vert_eo','torsion','desv_eo','desv_altura'];
  var compIds=['galvanizado','golpes','entalladura','pliegue','cabezas','corte','mecanizados',
    'orientacion','perfil','relleno','oxidacion','socavones','cimentacion','zanjas','centrado','diametro'];
  // Find the actual pilar columns from header
  var hRow=rows[startRow+1];if(!hRow)return;
  var pilarCols=[];
  for(var i=0;i<pils.length;i++){
    for(var c=1;c<(hRow.length||20);c++){
      var h=String(hRow[c]||'').trim();
      if(h===pils[i]||(h.indexOf(pils[i])>=0&&h.length<12)){pilarCols.push(c);break}
    }
  }
  if(pilarCols.length!==pils.length)return;
  // Read mediciones (next 7 rows after pilar header)
  // Excel format: row startRow+2=Altura, +3=Vert NS, +4=Vert EO, +5=Torsion, +6=Desv EO, +7=Desv Alt, +8=Dist NS
  // But our order is: altura, dist_ns_tramo, vert_ns, vert_eo, torsion, desv_eo, desv_altura
  // Excel order: altura(31), vert_ns(32), vert_eo(33), torsion(34), desv_eo(35), desv_alt(36), dist_ns(37)
  var excelMedMap=[
    {excelOffset:2,id:'altura'},
    {excelOffset:3,id:'vert_ns'},
    {excelOffset:4,id:'vert_eo'},
    {excelOffset:5,id:'torsion'},
    {excelOffset:6,id:'desv_eo'},
    {excelOffset:7,id:'desv_altura'},
    {excelOffset:8,id:'dist_ns_tramo'}
  ];
  excelMedMap.forEach(function(em){
    var row=rows[startRow+em.excelOffset];if(!row)return;
    pilarCols.forEach(function(col,pi){
      var v=row[col];if(v==null||v==='')return;
      var key=px+'_'+pi+'_'+em.id;
      if(typeof v==='number')td.cim[key]=v;
      else{var s=String(v).trim().toUpperCase();if(s==='SI'||s==='NO'||s==='NA'||s==='N/A'||s==='OK')td.cim[key]=s;else{var n=parseFloat(v);if(!isNaN(n))td.cim[key]=n}}
    });
  });
  // Comprobaciones: after mediciones, skip comprobacion header row
  // Find "Comprobación" row
  var compStart=-1;
  for(var r=startRow+8;r<Math.min(startRow+30,rows.length);r++){
    if(rows[r]&&String(rows[r][0]||'').toLowerCase().indexOf('comprob')>=0){compStart=r;break}
  }
  if(compStart<0)return;
  compIds.forEach(function(cid,j){
    var row=rows[compStart+1+j];if(!row)return;
    pilarCols.forEach(function(col,pi){
      var v=row[col];if(v==null||v==='')return;
      var key=px+'_'+pi+'_'+cid;
      var s=String(v).trim().toUpperCase();
      if(s==='SI'||s==='NO'||s==='NA'||s==='N/A'||s==='OK')td.cim[key]=s;
    });
  });
}

function rPlano(pv,sub){
  // Gather trackers for this PV/sub
  var trs=[];
  Object.keys(MASTER_DATA).forEach(function(code){
    var d=MASTER_DATA[code];
    if(d.pv!==pv)return;
    if(sub>0&&d.sub!==sub)return;
    if(sub===0&&d.sub>0)return;
    trs.push({code:code,d:d});
  });
  if(trs.length===0)return '';
  
  // Bounding box in UTM
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  var LARGO_H=56,CORTO_H=28,W=2.5;
  trs.forEach(function(t){
    var h=(t.d.type.indexOf('largo')>=0?LARGO_H:CORTO_H)/2;
    if(t.d.mx-W/2<minX)minX=t.d.mx-W/2;
    if(t.d.mx+W/2>maxX)maxX=t.d.mx+W/2;
    if(t.d.my-h<minY)minY=t.d.my-h;
    if(t.d.my+h>maxY)maxY=t.d.my+h;
  });
  
  var pad=15; // meters padding
  minX-=pad;maxX+=pad;minY-=pad;maxY+=pad;
  var spanX=maxX-minX,spanY=maxY-minY;
  
  // Canvas size
  var cW=Math.min(window.innerWidth-32,800);
  var scale=cW/spanX;
  var cH=Math.round(spanY*scale);
  if(cH>cW*1.8){scale=cW*1.8/spanY;cH=Math.round(spanY*scale);cW=Math.round(spanX*scale)}
  if(cH<200)cH=200;
  
  // Store for interaction
  window._planoTrs=trs;
  window._planoMinX=minX;window._planoMaxY=maxY;
  window._planoScale=scale;window._planoCW=cW;window._planoCH=cH;
  
  var h='<div style="margin-bottom:8px">';
  h+='<canvas id="planoCanvas" width="'+cW+'" height="'+cH+'" style="width:100%;border-radius:10px;background:#1a1f2e;border:1px solid var(--bd);touch-action:manipulation"></canvas>';
  h+='<div id="planoTip" style="display:none;position:absolute;background:var(--sf);border:1px solid var(--ac);border-radius:8px;padding:8px 12px;font-size:12px;z-index:50;pointer-events:none"></div>';
  h+='<div id="planoDbg" style="font-size:10px;color:var(--td);text-align:center;margin-top:4px">Cargando datos...</div>';
  h+='</div>';
  return h;
}

function drawPlano(){
  var cv=document.getElementById('planoCanvas');
  if(!cv||!window._planoTrs)return;
  var ctx=cv.getContext('2d');
  var trs=window._planoTrs;
  var minX=window._planoMinX,maxY=window._planoMaxY,scale=window._planoScale;
  var LARGO_H=56,CORTO_H=28,W=2.5;
  
  ctx.clearRect(0,0,cv.width,cv.height);
  
  // Store rects for hit testing
  window._planoRects=[];
  
  trs.forEach(function(t){
    var d=t.d,code=t.code;
    var isLargo=d.type.indexOf('largo')>=0;
    var rectH=(isLargo?LARGO_H:CORTO_H)*scale;
    var rectW=Math.max(W*scale,8);
    var cx=(d.mx-minX)*scale;
    var cy=(maxY-d.my)*scale;
    var rx=cx-rectW/2, ry=cy-rectH/2;
    
    // Color based on cimentaciones status
    var td=APP.trackers[code];
    var color='#3b82f6'; // blue: not reviewed
    if(td){
      // 1. Check local data first
      var ct=countF(code);
      if(ct.cimF>=ct.cimT&&ct.cimT>0){
        var st=calcStatus(code);
        var hasBad=(st.m_alt==='SI/MAL'||st.m_dist==='SI/MAL'||st.m_vert==='SI/MAL'||st.m_rest==='SI/MAL'||st.c_alt==='SI/MAL'||st.c_dist==='SI/MAL'||st.c_vert==='SI/MAL'||st.c_rest==='SI/MAL');
        color=hasBad?'#ef4444':'#22c55e';
      }else if(ct.cimF>0){
        color='#f59e0b';
      }
      // 2. If still blue, check cloud data
      if(color==='#3b82f6'){
        var cs=td.cloudSt;
        if(cs){
          var hasSIMAL=false,hasSI=false;
          ['m_alt','m_dist','m_vert','m_rest','c_alt','c_dist','c_vert','c_rest'].forEach(function(k){
            var v=String(cs[k]||'');
            if(v==='SI/MAL')hasSIMAL=true;
            if(v==='SI'||v==='PDTE'||v==='SI/MAL')hasSI=true;
          });
          if(hasSIMAL)color='#ef4444';
          else if(hasSI)color='#f59e0b';
        }
        // Also check cloudPct
        var cp=String(td.cloudPct||'');
        if(cp==='SI'&&color==='#3b82f6')color='#22c55e';
        else if(cp==='SI'&&color==='#f59e0b'){
          // All status filled + checklist SI = complete, check for bad
          if(!td.cloudSt||!hasSIMAL)color='#22c55e';
        }
        else if(cp==='PDTE'&&color==='#3b82f6')color='#f59e0b';
      }
    }
    
    ctx.fillStyle=color;
    ctx.fillRect(rx,ry,rectW,rectH);
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.lineWidth=0.5;
    ctx.strokeRect(rx,ry,rectW,rectH);
    
    // Tracker number label
    var num=String(d.num);
    var fontSize=Math.max(Math.min(rectW*1.8,rectH*0.12,11),6);
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(-Math.PI/2);
    ctx.fillStyle='#fff';
    ctx.font='bold '+fontSize+'px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(num,0,0);
    ctx.restore();
    
    window._planoRects.push({code:code,x:rx,y:ry,w:rectW,h:rectH,d:d});
  });
  
  // Legend
  var lgY=cv.height-30;
  var legends=[{c:'#22c55e',l:'OK'},{c:'#ef4444',l:'SI/MAL'},{c:'#f59e0b',l:'En curso'},{c:'#3b82f6',l:'Sin revisar'}];
  ctx.font='bold 10px sans-serif';
  var lgX=8;
  legends.forEach(function(lg){
    ctx.fillStyle=lg.c;
    ctx.fillRect(lgX,lgY,12,12);
    ctx.fillStyle='#ccc';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(lg.l,lgX+16,lgY+6);
    lgX+=ctx.measureText(lg.l).width+30;
  });
}

function initPlanoEvents(){
  var cv=document.getElementById('planoCanvas');
  if(!cv)return;
  
  function handleTap(clientX,clientY){
    var rect=cv.getBoundingClientRect();
    var scaleX=cv.width/rect.width;
    var scaleY=cv.height/rect.height;
    var px=(clientX-rect.left)*scaleX;
    var py=(clientY-rect.top)*scaleY;
    
    // Find closest tracker within 20px
    var best=null,bestDist=20;
    (window._planoRects||[]).forEach(function(r){
      var cx=r.x+r.w/2, cy=r.y+r.h/2;
      var dx=px-cx, dy=py-cy;
      // Check if inside expanded rect first
      var ex=15;
      if(px>=r.x-ex&&px<=r.x+r.w+ex&&py>=r.y-ex&&py<=r.y+r.h+ex){
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<bestDist||!best){best=r;bestDist=dist}
      }
    });
    
    if(best){openTr(best.code)}
  }
  
  cv.addEventListener('click',function(e){
    handleTap(e.clientX,e.clientY);
  });
  
  cv.addEventListener('touchend',function(e){
    e.preventDefault();
    var t=e.changedTouches[0];
    if(t)handleTap(t.clientX,t.clientY);
  });
}

function drawDailyChart(days,byDay){
  var cv=document.getElementById('dailyChart');
  if(!cv)return;
  var ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height;
  var pad={l:35,r:10,t:10,b:30};
  var cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  var show=days.slice(-30);
  var vals=show.map(function(d){return byDay[d].changes});
  var maxV=Math.max.apply(null,vals)||1;
  var barW=Math.max(cW/show.length-2,4);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.t+cH-cH*(i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#888';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*i/4),pad.l-4,y+3);
  }
  show.forEach(function(day,i){
    var v=byDay[day].changes;
    var bH=cH*(v/maxV);
    var x=pad.l+i*(cW/show.length)+(cW/show.length-barW)/2;
    var y2=pad.t+cH-bH;
    ctx.fillStyle='#f59e0b';
    ctx.fillRect(x,y2,barW,bH);
    if(show.length<=15||i%Math.ceil(show.length/10)===0){
      ctx.save();ctx.translate(x+barW/2,H-5);ctx.rotate(-0.5);
      ctx.fillStyle='#888';ctx.font='8px sans-serif';ctx.textAlign='center';
      ctx.fillText(day.substring(5),0,0);
      ctx.restore();
    }
  });
}

  var h='<div class="hdr"><button class="btn-icon" onclick="V.screen=\'modesel\';R()" style="font-size:20px;min-width:38px">←</button><div><h1>🏗️ Construcción</h1><div class="sub">Selecciona tracker</div></div></div>';
  h+='<div class="cnt" style="padding-top:10px">';
  
  // PV selector
  var pvs=[...new Set(Object.values(MASTER_DATA).map(function(d){return d.pv}))].sort(function(a,b){return a-b});
  h+='<div class="stitle">PV</div><select class="sel" id="csp" onchange="V.conPv=parseInt(this.value);updConSub();updConTL()">';
  h+='<option value="">Selecciona PV</option>';
  pvs.forEach(function(p){h+='<option value="'+p+'"'+(V.conPv===p?' selected':'')+'>PV'+String(p).padStart(2,'0')+'</option>'});
  h+='</select>';
  
  // Sub selector  
  h+='<div class="stitle" style="margin-top:10px">Subcampo</div><select class="sel" id="css" onchange="V.conSub=parseInt(this.value);updConTL()">';
  h+='<option value="">Todos</option></select>';
  
  // Tracker list
  h+='<div id="con-list" style="margin-top:12px"></div>';
  h+='</div>';
  a.innerHTML=h;
  updConSub();
  updConTL();
}

function updConSub(){
  var pv=V.conPv||0,sel=document.getElementById('css');
  if(!sel)return;
  var subs=[...new Set(Object.values(MASTER_DATA).filter(function(d){return d.pv===pv&&d.sub>0}).map(function(d){return d.sub}))].sort(function(a,b){return a-b});
  sel.innerHTML='<option value="0">Todos</option>';
  subs.forEach(function(s){sel.innerHTML+='<option value="'+s+'"'+(V.conSub===s?' selected':'')+'>Subcampo '+s+'</option>'});
}

function updConTL(){
  var pv=V.conPv||0,sub=V.conSub||0;
  var list=document.getElementById('con-list');
  if(!list||!pv)return;
  
  var codes=Object.keys(MASTER_DATA).filter(function(code){
    var d=MASTER_DATA[code];
    if(d.pv!==pv)return false;
    if(sub>0&&d.sub!==sub)return false;
    return true;
  }).sort();
  
  var h='';
  codes.forEach(function(code){
    var d=MASTER_DATA[code];
    var con=getConD(code);
    var cfg=PCFG[d.type];
    var totalPilars=cfg.motor.length+(cfg.conducida?cfg.conducida.length:0);
    var hincadas=0,rechazos=0,intentadas=0;
    
    for(var f=0;f<(cfg.conducida?2:1);f++){
      var px=f===0?'fm':'fc';
      var pils=f===0?cfg.motor:cfg.conducida;
      for(var i=0;i<pils.length;i++){
        var est=con[px+'_'+i+'_estado']||'no_intentada';
        if(est==='hincada')hincadas++;
        else if(est==='rechazo')rechazos++;
        else if(est==='intentada')intentadas++;
      }
    }
    
    var pct=totalPilars>0?Math.round(hincadas/totalPilars*100):0;
    var stColor=pct>=100?'var(--ok)':hincadas>0?'#f59e0b':'var(--bd)';
    
    h+='<button class="tr-item" onclick="V.conTr=\''+code+'\';V.screen=\'contractor\';V.conFila=\'motor\';V.conPi=0;R()" style="display:block;width:100%;text-align:left;padding:12px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);margin-bottom:6px;cursor:pointer">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center">';
    h+='<div><span style="font-weight:700;font-size:16px;color:var(--tx)">'+d.num+'</span> <span style="font-size:11px;color:var(--td)">'+d.type+'</span></div>';
    h+='<div style="display:flex;align-items:center;gap:6px">';
    if(rechazos>0)h+='<span style="font-size:11px;color:var(--no)">🔴'+rechazos+'</span>';
    if(intentadas>0)h+='<span style="font-size:11px;color:#f59e0b">🟡'+intentadas+'</span>';
    h+='<span style="font-size:13px;font-weight:700;color:'+stColor+'">'+hincadas+'/'+totalPilars+'</span>';
    h+='</div></div>';
    h+='<div class="pbar" style="margin-top:6px;height:4px"><div class="pbar-f" style="width:'+pct+'%;background:'+stColor+'"></div></div>';
    h+='</button>';
  });
  
  if(codes.length===0)h='<div style="text-align:center;padding:20px;color:var(--td)">Selecciona un PV</div>';
  list.innerHTML=h;
}

// Construction tracker view
function rConTracker(a){
  var code=V.conTr;
  if(!code){V.screen='conselect';R();return}
  var m=getMI(code),cfg=PCFG[m.type],con=getConD(code);
  var filas=cfg.conducida?['motor','conducida']:['motor'];
  var fila=V.conFila||'motor';
  var pils=cfg[fila];
  var px=fila==='motor'?'fm':'fc';
  var pi=V.conPi||0;
  if(pi>=pils.length)pi=0;
  
  // Count stats
  var totalAll=0,hincadasAll=0;
  filas.forEach(function(f){
    var pp=cfg[f],ppx=f==='motor'?'fm':'fc';
    for(var i=0;i<pp.length;i++){
      totalAll++;
      if((con[ppx+'_'+i+'_estado']||'no_intentada')==='hincada')hincadasAll++;
    }
  });
  var pctAll=totalAll>0?Math.round(hincadasAll/totalAll*100):0;
  
  var h='<div class="hdr"><button class="btn-icon" onclick="V.screen=\'conselect\';R()" style="font-size:20px;min-width:38px">←</button><div><h1>🏗️ '+code+'</h1><div class="sub">'+m.type+' · '+hincadasAll+'/'+totalAll+' hincadas</div></div>';
  h+='<div class="hdr-r"><div style="min-width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:'+(pctAll>=100?'var(--ok)':'var(--sf2)')+';color:'+(pctAll>=100?'#fff':'var(--ac)')+'">'+pctAll+'%</div></div></div>';
  
  // Progress bar
  h+='<div style="padding:0 16px"><div class="pbar" style="height:8px;margin:8px 0"><div class="pbar-f'+(pctAll>=100?' done':'')+'" style="width:'+pctAll+'%"></div></div></div>';
  
  h+='<div class="cnt" style="padding-top:6px">';
  
  // Fila tabs
  if(filas.length>1){
    h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
    filas.forEach(function(f){
      var sel=f===fila;
      h+='<button onclick="V.conFila=\''+f+'\';V.conPi=0;R()" style="flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:13px;border:2px solid '+(sel?'var(--ac)':'var(--bd)')+';background:'+(sel?'rgba(62,207,142,.1)':'var(--sf)')+';color:'+(sel?'var(--ac)':'var(--td)')+';cursor:pointer">Fila '+(f==='motor'?'Motor':'Conducida')+'</button>';
    });
    h+='</div>';
  }
  
  // Pillar buttons
  h+='<div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch">';
  pils.forEach(function(p,i){
    var est=con[px+'_'+i+'_estado']||'no_intentada';
    var estObj=CON_ESTADOS.find(function(e){return e.id===est});
    var bgColor=est==='hincada'?'rgba(34,197,94,.2)':est==='rechazo'?'rgba(239,68,68,.2)':est==='intentada'?'rgba(245,158,11,.2)':'transparent';
    var bdColor=est==='hincada'?'var(--ok)':est==='rechazo'?'var(--no)':est==='intentada'?'#f59e0b':'var(--bd)';
    var cls=i===pi?'outline:2px solid var(--ac);outline-offset:2px;':'';
    h+='<button onclick="V.conPi='+i+';R()" style="flex-shrink:0;min-width:52px;padding:6px 8px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;border:2px solid '+bdColor+';background:'+bgColor+';color:var(--tx);cursor:pointer;'+cls+'">';
    h+=p+'<div style="font-size:14px;margin-top:2px">'+estObj.icon+'</div></button>';
  });
  h+='</div>';
  
  // Current pilar detail
  var pilarName=pils[pi];
  var estKey=px+'_'+pi+'_estado';
  var tipoKey=px+'_'+pi+'_tipo';
  var equipoKey=px+'_'+pi+'_equipo';
  var motivoKey=px+'_'+pi+'_motivo';
  var curEst=con[estKey]||'no_intentada';
  var curTipo=con[tipoKey]||'';
  var curEquipo=con[equipoKey]||'';
  var curMotivo=con[motivoKey]||'';
  
  h+='<div class="card" style="margin-top:10px;padding:16px">';
  h+='<div style="font-weight:700;font-size:16px;margin-bottom:14px">'+pilarName+'</div>';
  
  // Estado buttons
  h+='<div style="font-size:11px;font-weight:600;color:var(--td);margin-bottom:6px">ESTADO DE HINCA</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px">';
  CON_ESTADOS.forEach(function(e){
    var sel=curEst===e.id;
    h+='<button onclick="setConField(\''+code+'\',\''+estKey+'\',\''+e.id+'\');R()" style="padding:12px;border-radius:10px;font-size:13px;font-weight:600;border:2px solid '+(sel?e.color:'var(--bd)')+';background:'+(sel?e.color+'22':'var(--sf)')+';color:'+(sel?'var(--tx)':'var(--td)')+';cursor:pointer">'+e.icon+' '+e.label+'</button>';
  });
  h+='</div>';
  
  // Tipo buttons
  h+='<div style="font-size:11px;font-weight:600;color:var(--td);margin-bottom:6px">TIPO DE HINCA</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px">';
  CON_TIPOS.forEach(function(t){
    var sel=curTipo===t.id;
    h+='<button onclick="setConField(\''+code+'\',\''+tipoKey+'\',\''+t.id+'\');R()" style="padding:10px;border-radius:10px;font-size:12px;font-weight:600;border:2px solid '+(sel?'var(--ac)':'var(--bd)')+';background:'+(sel?'rgba(62,207,142,.15)':'var(--sf)')+';color:'+(sel?'var(--ac)':'var(--td)')+';cursor:pointer">'+t.icon+'<br>'+t.label+'</button>';
  });
  h+='</div>';
  
  // Equipo
  h+='<div style="font-size:11px;font-weight:600;color:var(--td);margin-bottom:6px">EQUIPO / MÁQUINA</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px">';
  CON_EQUIPOS.forEach(function(eq){
    var sel=curEquipo===eq;
    h+='<button onclick="setConField(\''+code+'\',\''+equipoKey+'\',\''+eq+'\');R()" style="padding:6px 12px;border-radius:8px;font-size:11px;border:1px solid '+(sel?'var(--ac)':'var(--bd)')+';background:'+(sel?'rgba(62,207,142,.15)':'var(--sf)')+';color:'+(sel?'var(--ac)':'var(--td)')+';cursor:pointer">'+eq+'</button>';
  });
  h+='</div>';
  
  // Motivo rechazo (only if rechazo)
  if(curEst==='rechazo'){
    h+='<div style="font-size:11px;font-weight:600;color:var(--no);margin-bottom:6px">MOTIVO DE RECHAZO</div>';
    h+='<textarea id="con-motivo" onchange="setConField(\''+code+'\',\''+motivoKey+'\',this.value)" style="width:100%;height:60px;border-radius:10px;border:1px solid var(--no);background:var(--sf);color:var(--tx);padding:10px;font-size:13px;resize:vertical" placeholder="Describe el motivo...">'+curMotivo+'</textarea>';
  }
  
  // Timestamp + GPS
  var ts=con[px+'_'+pi+'_ts']||'';
  h+='<div style="display:flex;gap:8px;margin-top:10px;font-size:10px;color:var(--tx3)">';
  if(ts)h+='<span>⏱ '+new Date(parseInt(ts)).toLocaleString('es-ES')+'</span>';
  var glat=con[px+'_'+pi+'_glat']||'';
  if(glat)h+='<span>📍 '+parseFloat(glat).toFixed(5)+'</span>';
  h+='</div>';
  
  h+='</div>'; // card
  
  // Next/prev pilar navigation
  h+='<div style="display:flex;gap:8px;margin-top:10px">';
  if(pi>0)h+='<button onclick="V.conPi='+(pi-1)+';R()" style="flex:1;padding:12px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);color:var(--td);font-weight:600;cursor:pointer">← '+pils[pi-1]+'</button>';
  if(pi<pils.length-1)h+='<button onclick="V.conPi='+(pi+1)+';R()" style="flex:1;padding:12px;border-radius:10px;background:var(--ac);border:none;color:#000;font-weight:700;cursor:pointer">'+pils[pi+1]+' →</button>';
  else if(filas.length>1&&fila==='motor')h+='<button onclick="V.conFila=\'conducida\';V.conPi=0;R()" style="flex:1;padding:12px;border-radius:10px;background:var(--info);border:none;color:#fff;font-weight:700;cursor:pointer">Fila Conducida →</button>';
  h+='</div>';
  
  h+='</div>'; // cnt
  a.innerHTML=h;
}

function setConField(code,key,val){
  var con=getConD(code);
  con[key]=val;
  // Auto-set timestamp and GPS
  var parts=key.match(/^(fm|fc)_(\d+)_/);
  if(parts){
    con[parts[0]+'ts']=String(Date.now());
    var gps=gpsNow();
    if(gps.lat)con[parts[0]+'glat']=String(gps.lat);
    if(gps.lon)con[parts[0]+'glon']=String(gps.lon);
  }
  sv();
  syncCon(code);
}

var CON_SYNC_T=null;
function syncCon(code){
  if(!CFG.syncUrl||!code)return;
  if(CON_SYNC_T)clearTimeout(CON_SYNC_T);
  CON_SYNC_T=setTimeout(function(){flushConSync(code)},5000);
}

function flushConSync(code){
  if(!CFG.syncUrl||!code)return;
  var td=getTD(code),m=getMI(code),con=getConD(code);
  var cfg=PCFG[m.type];
  var filas=cfg.conducida?['motor','conducida']:['motor'];
  
  // Collect all construction changes
  var changes=[];
  filas.forEach(function(f){
    var px=f==='motor'?'fm':'fc';
    var pils=cfg[f];
    pils.forEach(function(p,i){
      ['estado','tipo','equipo','motivo'].forEach(function(field){
        var val=con[px+'_'+i+'_'+field];
        if(val){
          changes.push({fid:'con_'+field,fv:val,fp:p,ff:f==='motor'?'Motor':'Conducida'});
        }
      });
    });
  });
  
  // Count stats
  var totalPilars=0,hincadas=0,rechazos=0;
  filas.forEach(function(f){
    var px=f==='motor'?'fm':'fc';
    cfg[f].forEach(function(p,i){
      totalPilars++;
      var est=con[px+'_'+i+'_estado']||'no_intentada';
      if(est==='hincada')hincadas++;
      if(est==='rechazo')rechazos++;
    });
  });
  
  var payload={
    a:'sc',t:code,tp:m?.type||'',pv:m?.pv||'',sub:m?.sub||0,
    te:CFG.tecnico||'',
    ch:hincadas,cr:rechazos,ct:totalPilars,
    changes:changes,
    gl:gpsNow().lat||'',go:gpsNow().lon||''
  };
  
  doSync(payload);
}


function R(){({setup:rSetup,home:rHome,select:rSelect,tracker:rTracker,dashboard:rDashboard,modesel:rModeSel,conselect:rConSelect,contractor:rConTracker,config:rConfig})[V.screen](document.getElementById('app'));setTimeout(()=>showSync(''),50)}

function trCimStatus(code){
  if(!APP.trackers[code])return'none';
  var td=getTD(code),m=getMI(code);if(!m)return'none';
  var cfg=PCFG[m.type],filas=cfg.conducida?['motor','conducida']:['motor'];
  var anyFill=false,allDone=true,anyBad=false;
  var defMap={torsion:'NO',desv_eo:'NO',desv_altura:'NO',
    galvanizado:'SI',golpes:'NO',entalladura:'NO',pliegue:'NO',cabezas:'NO',
    corte:'NO',mecanizados:'NO',orientacion:'SI',perfil:'SI',relleno:'N/A',
    oxidacion:'NO',socavones:'NO',cimentacion:'SI',zanjas:'NO',centrado:'N/A',diametro:'N/A'};
  filas.forEach(function(f){
    var pils=cfg[f],px=f==='motor'?'fm':'fc',mpI=getMPi(m.type);
    pils.forEach(function(_,i){
      var fl=0,tt=0,bad=false;
      [...MED,...COMP].forEach(function(field){
        if(field.isTramo&&i===mpI)return;
        tt++;var v=td.cim[px+'_'+i+'_'+field.id];
        if(v!=null){fl++;
          if(field.tol&&typeof v==='number'&&(v<field.tol[0]||v>field.tol[1]))bad=true;
          if(field.def!=null&&v!==field.def)bad=true;
        }
      });
      if(fl>0)anyFill=true;
      if(fl<tt)allDone=false;
      if(bad)anyBad=true;
      if(!bad&&i!==mpI){var ds=calcDistSum(td,px,i,m.type);var dc=getDistCfg(m.type);
        if(ds!=null&&dc[i]&&(ds<dc[i].tol[0]||ds>dc[i].tol[1]))anyBad=true}
    });
  });
  if(!anyFill)return'none';
  if(anyBad)return'bad';
  if(allDone)return'ok';
  return'wip';
}

// CIMENTACIONES
function rCim(code,td,m,cfg){
  const filas=cfg.conducida?['motor','conducida']:['motor'];
  let h='';
  if(cfg.conducida){h+='<div class="tabs">';filas.forEach(f=>h+='<button class="tab '+(V.fila===f?'on':'')+'" onclick="V.fila=\''+f+'\';V.pi=0;R()">'+(f==='motor'?'Fila Motor':'Fila Conducida')+'</button>');h+='</div>'}
  const pils=cfg[V.fila]||cfg.motor,px=V.fila==='motor'?'fm':'fc',pi=V.pi,mpI=getMPi(m.type);
  h+='<div class="pils">';
  pils.forEach((p,i)=>{
    let fl=0,hasBad=false;
    [...MED,...COMP].forEach(f=>{
      if(f.isTramo&&i===mpI)return;
      var key=px+'_'+i+'_'+f.id, val=td.cim[key];
      if(val!=null){
        fl++;
        if(f.tol&&typeof val==='number'&&(val<f.tol[0]||val>f.tol[1]))hasBad=true;
        if(f.def!=null&&val!==f.def)hasBad=true;
      }
    });
    // Check accumulated distance tolerance
    if(!hasBad&&i!==mpI){var ds=calcDistSum(td,px,i,m.type);var dc=getDistCfg(m.type);
      if(ds!=null&&dc[i]&&(ds<dc[i].tol[0]||ds>dc[i].tol[1]))hasBad=true}
    var tt=MED.length+COMP.length-(i===mpI?1:0);
    var cls='pil';
    if(i===pi)cls+=' on';
    if(fl===0)cls+=' p-empty';
    else if(fl<tt)cls+=hasBad?' p-mal':' p-pdte';
    else cls+=hasBad?' p-mal':' p-ok';
    h+='<button class="'+cls+'" onclick="V.pi='+i+';R()">'+p+'<div style="font-size:9px;opacity:.6;margin-top:2px">'+fl+'/'+tt+'</div></button>';
  });
  h+='</div>';
  // Photos
  const pk='cim_'+px+'_'+pils[pi],pph=td.photos[pk]||[];
  h+='<div class="card"><div style="font-size:10px;font-weight:700;color:var(--td);margin-bottom:4px">📷 '+pils[pi]+'</div><div class="photo-row">';
  pph.forEach((_,i)=>h+='<div class="ph-th"><img src="'+pph[i].data+'"><button class="ph-del" onclick="rmPh(\''+code+'\',\''+pk+'\','+i+')">×</button></div>');
  h+='<button class="ph-add" onclick="tkPh(\''+code+'\',\''+pk+'\')"><span style="font-size:18px">📷</span><span>Foto</span></button></div></div>';
  
  const isMPpilar=(pi===mpI);
  h+='<div class="stitle">Mediciones — '+pils[pi]+'</div>';
  MED.forEach(med=>{
    if(med.isTramo&&isMPpilar)return;
    const key=px+'_'+pi+'_'+med.id,val=td.cim[key];
    let outR=false;if(med.tol&&val!=null)outR=val<med.tol[0]||val>med.tol[1];
    h+='<div class="card"><div style="font-size:13px;margin-bottom:6px">'+med.label+'</div>';
    if(med.type==='number'){
      h+='<div style="display:flex;align-items:center;gap:8px"><input type="number" inputmode="decimal" step="any" class="inp '+(val!=null?'has':'')+' '+(outR?'bad':'')+'" value="'+(val??'')+'" placeholder="—" onchange="setCV(\''+code+'\',\''+key+'\',this.value)">'+(med.unit?'<span style="font-size:12px;color:var(--td)">'+med.unit+'</span>':'')+'</div>';
      if(outR)h+='<div style="font-size:11px;color:var(--no);margin-top:4px">⚠ Fuera de tolerancia ('+med.tol[0]+' — '+med.tol[1]+')</div>';
      if(med.isTramo&&!isMPpilar){
        const distSum=calcDistSum(td,px,pi,m.type),dc=getDistCfg(m.type),di=dc[pi];
        let sumBad=false;if(distSum!=null&&di)sumBad=distSum<di.tol[0]||distSum>di.tol[1];
        h+='<div class="sum-row" style="'+(sumBad?'color:var(--no);background:#1a0a0a':'')+'"><span style="font-weight:700">Σ Acumulada:</span><span style="font-family:monospace;font-size:14px;font-weight:700">'+(distSum!=null?distSum+' mm':'—')+'</span>'+(di?'<span style="opacity:.6;font-size:10px">Tol: '+di.tol[0]+'–'+di.tol[1]+'</span>':'')+(sumBad?'<span>⚠️</span>':'')+'</div>';
      }
    }else{h+=rOkNo(val,"setCV('"+code+"','"+key+"','{V}')")}
    h+='</div>';
  });
  h+='<div class="stitle" style="margin-top:10px">Comprobación — '+pils[pi]+'</div>';
  COMP.forEach(c=>{const key=px+'_'+pi+'_'+c.id,val=td.cim[key];
    var who=td._who&&td._who[key]?'<div style="font-size:9px;color:var(--td);margin-top:2px">👤 '+td._who[key]+'</div>':'';
    h+='<div class="card card-row"><div class="card-label">'+c.label+who+'</div>'+rOkNo(val,"setCV('"+code+"','"+key+"','{V}')",true)+'</div>';
  });
  return h;
}

}
function rmPh(code,key,i){const td=getTD(code);if(td.photos[key])td.photos[key].splice(i,1);sv();syncTracker(code);R()}

// DASHBOARD
function rDash(a){
  const codes=Object.keys(APP.trackers).sort(),stats=codes.map(c=>({code:c,...countF(c),m:getMI(c)}));
  const done=stats.filter(s=>s.pct===100).length,avg=stats.length?Math.round(stats.reduce((x,s)=>x+s.pct,0)/stats.length):0;
  let nos=0,tph=0;codes.forEach(c=>{const td=APP.trackers[c];Object.values(td.cim||{}).forEach(v=>{if(v==='NO')nos++});Object.values(td.mont||{}).forEach(v=>{if(v==='NO')nos++});tph+=Object.values(td.photos||{}).reduce((x,arr)=>x+arr.length,0)});
  let h='<div class="hdr"><button class="btn-icon" onclick="V.screen=\'home\';R()" style="font-size:20px;min-width:38px">←</button><div><h1>Dashboard</h1></div><div class="hdr-r"><button class="exp-b" onclick="exportDash()" style="height:36px;padding:0 14px;background:#217346;color:#fff;border-radius:10px;font-size:12px;width:auto;margin:0">📊</button></div></div>';
  h+='<div class="cnt" style="padding-top:14px"><div class="grid2"><div class="sc"><div class="sc-l">Avance</div><div class="sc-v" style="color:var(--ac)">'+avg+'%</div></div><div class="sc"><div class="sc-l">Completados</div><div class="sc-v" style="color:var(--ok)">'+done+'</div></div><div class="sc"><div class="sc-l">NOs</div><div class="sc-v" style="color:'+(nos?'var(--no)':'var(--ok)')+'">'+nos+'</div></div><div class="sc"><div class="sc-l">Fotos</div><div class="sc-v" style="color:var(--ac)">'+tph+'</div></div></div>';
  const byPV={};stats.forEach(s=>{const pv=s.m?.pv||0;if(!byPV[pv])byPV[pv]=[];byPV[pv].push(s)});
  Object.entries(byPV).sort((x,y)=>x[0]-y[0]).forEach(([pv,ps])=>{const dn=ps.filter(s=>s.pct===100).length;
    h+='<div class="card" style="margin-top:10px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-weight:700">PV'+String(pv).padStart(2,'0')+'</span><span style="font-size:10px;padding:3px 6px;border-radius:6px;background:var(--sf2);color:var(--td)">'+dn+'/'+ps.length+'</span></div><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px">';
    ps.sort((x,y)=>(x.m?.num||0)-(y.m?.num||0)).forEach(s=>{h+='<div style="aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid '+(s.pct===100?'rgba(34,197,94,.3)':s.pct>0?'rgba(245,158,11,.3)':'var(--bd)')+';background:'+(s.pct===100?'rgba(34,197,94,.1)':s.pct>0?'rgba(245,158,11,.1)':'var(--sf2)')+';color:'+(s.pct===100?'var(--ok)':s.pct>0?'var(--ac)':'var(--td)')+'"><div>'+(s.m?.num||'')+'</div><div style="opacity:.6">'+s.pct+'%</div></div>'});
    h+='</div></div>';
  });  if(isAdmin()){
    h+='<div class="card" style="margin-top:14px;padding:14px"><div class="stitle">Exportar por subcampo</div>';
    h+='<div style="display:flex;gap:6px;margin-bottom:8px"><select class="sel" id="xpv" style="flex:1" onchange="updXsub()"><option value="">PV</option>';
    var xpvs=[...new Set(Object.values(MASTER_DATA).map(function(d){return d.pv}))].sort(function(a,b){return a-b});
    xpvs.forEach(function(p){h+='<option value="'+p+'">PV'+String(p).padStart(2,'0')+'</option>'});
    h+='</select><select class="sel" id="xsub" style="flex:1"><option value="">Sub</option></select>';
    h+='<button onclick="var p=parseInt(document.getElementById(\'xpv\').value),s=parseInt(document.getElementById(\'xsub\').value);if(p&&s)exportSubcampo(p,s);else alert(\'Selecciona PV y subcampo\')" style="padding:0 16px;height:46px;border-radius:10px;background:#217346;color:#fff;font-weight:700;font-size:12px">📊 Exportar</button></div></div>';
  }
  h+='</div>';a.innerHTML=h;
}
function updXsub(){
  var pv=parseInt(document.getElementById('xpv').value),sel=document.getElementById('xsub');
  if(!pv){sel.innerHTML='<option value="">Sub</option>';return}
  var subs=[...new Set(Object.values(MASTER_DATA).filter(function(d){return d.pv===pv&&d.sub>0}).map(function(d){return d.sub}))].sort(function(a,b){return a-b});
  sel.innerHTML='<option value="">Sub</option>'+subs.map(function(s){return'<option value="'+s+'">'+s+'</option>'}).join('');
}

// CONFIG
function rConfig(a){const sz=(JSON.stringify(APP).length/1024).toFixed(1);
  a.innerHTML='<div class="hdr"><button class="btn-icon" onclick="V.screen=\'home\';R()" style="font-size:20px;min-width:38px">←</button><div><h1>Configuración</h1></div></div><div class="cnt" style="padding-top:14px"><div class="card" style="padding:14px"><label style="font-size:11px;color:var(--td);display:block;margin-bottom:4px">Nombre</label><input type="text" class="inp" value="'+(CFG.tecnico||'')+'" onchange="CFG.tecnico=this.value.trim();sc()" style="margin-bottom:12px"><label style="font-size:11px;color:var(--td);display:block;margin-bottom:4px">URL sincronización</label><input type="url" class="inp" value="'+(CFG.syncUrl||'')+'" readonly style="margin-bottom:10px;opacity:.6"><button onclick="syncAll();alert(\'Sincronizando \'+ Object.keys(APP.trackers).length+\' trackers...\')" style="width:100%;height:42px;border-radius:10px;background:#217346;color:#fff;font-size:13px;font-weight:700;margin-top:8px">☁️ Sincronizar TODO</button>'+(isAdmin()?'<div style="margin-top:12px"><label style="font-size:11px;color:var(--td);display:block;margin-bottom:4px">Importar Excel (checklists existentes)</label><input type="file" accept=".xlsx,.xls" onchange="if(this.files[0])importExcel(this.files[0])" style="font-size:12px;color:var(--td)"></div>':'')+'</div><div class="card" style="padding:14px;margin-top:8px"><div style="font-size:13px;font-weight:700;margin-bottom:6px">Datos: '+Object.keys(APP.trackers).length+' trackers · '+sz+' KB</div>'+(isAdmin()?'<button onclick="if(confirm(\'Borrar datos locales?\')){APP={trackers:{}};sv();R()}" style="width:100%;height:40px;border-radius:10px;background:transparent;color:var(--no);font-size:12px;border:1px solid var(--no);margin-top:6px">🗑️ Borrar datos locales</button>':'')+'</div></div>';
}

// INIT
startGPS();R();setTimeout(pullLocks,3000);
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
